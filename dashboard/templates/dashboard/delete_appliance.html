{% extends 'dashboard/base.html' %}

{% block content %}
  <h2>Delete Appliance</h2>
  <p>Are you sure you want to delete "{{ appliance.name }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
  </form>
  <a href="{% url 'dashboard:appliances' %}">Cancel</a>
{% endblock %}
